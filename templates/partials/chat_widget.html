<!-- Factory Assistant Chat Sidebar -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  /* ── FAB toggle ─────────────────────────────────────────────────────── */
  .chat-fab {
    position: fixed; bottom: 24px; right: 24px; z-index: 9998;
    width: 56px; height: 56px; border-radius: 50%;
    background: var(--green, #22c55e); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(34,197,94,.4);
    transition: transform .2s, opacity .2s;
  }
  .chat-fab:hover { transform: scale(1.08); }
  .chat-fab svg { width: 26px; height: 26px; fill: #fff; }
  .chat-fab.chat-hidden { transform: scale(0); opacity: 0; pointer-events: none; }

  /* ── Sidebar panel ──────────────────────────────────────────────────── */
  .chat-sidebar {
    position: fixed; top: 0; right: 0; z-index: 9999;
    width: 520px; height: 100vh;
    background: var(--surface, #1a1d27);
    border-left: 1px solid var(--border, #2a2d3e);
    display: flex; flex-direction: column;
    box-shadow: -4px 0 30px rgba(0,0,0,.4);
    transform: translateX(100%);
    transition: transform .3s cubic-bezier(.4,0,.2,1);
  }
  .chat-sidebar.chat-open { transform: translateX(0); }

  /* ── Header ─────────────────────────────────────────────────────────── */
  .chat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid var(--border, #2a2d3e); flex-shrink: 0;
  }
  .chat-header-title { font-weight: 600; font-size: 1rem; color: var(--text, #e2e8f0); }
  .chat-header-actions { display: flex; gap: 6px; }
  .chat-header-btn {
    background: rgba(255,255,255,.06); border: none; color: var(--muted, #64748b);
    border-radius: 6px; padding: 6px 12px; font-size: .78rem; cursor: pointer;
    transition: background .15s, color .15s;
  }
  .chat-header-btn:hover { background: rgba(255,255,255,.12); color: var(--text, #e2e8f0); }

  /* ── Quick questions ────────────────────────────────────────────────── */
  .chat-quick {
    padding: 12px 18px; border-bottom: 1px solid var(--border, #2a2d3e);
    display: flex; flex-wrap: wrap; gap: 8px; flex-shrink: 0;
  }
  .chat-quick-label {
    width: 100%; font-size: .72rem; color: var(--muted, #64748b);
    text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px;
  }
  .chat-quick-btn {
    background: rgba(255,255,255,.05); border: 1px solid var(--border, #2a2d3e);
    color: var(--text, #e2e8f0); border-radius: 8px; padding: 7px 12px;
    font-size: .78rem; cursor: pointer; transition: background .15s, border-color .15s;
    line-height: 1.3;
  }
  .chat-quick-btn:hover { background: rgba(34,197,94,.1); border-color: var(--green, #22c55e); }

  /* ── Messages area ──────────────────────────────────────────────────── */
  .chat-messages {
    flex: 1 1 0; height: 0; min-height: 0;
    overflow-y: auto; overflow-x: hidden;
    padding: 16px 18px; display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.25) transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 5px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.25); border-radius: 4px; }
  .chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.4); }

  .chat-msg { max-width: 90%; min-width: 0; padding: 10px 14px; border-radius: 12px; font-size: .85rem; line-height: 1.55; word-wrap: break-word; overflow-wrap: break-word; word-break: break-word; }
  .chat-msg-user { align-self: flex-end; background: #2563eb; color: #fff; border-bottom-right-radius: 4px; }
  .chat-msg-assistant { align-self: flex-start; background: rgba(255,255,255,.06); color: var(--text, #e2e8f0); border-bottom-left-radius: 4px; }
  .chat-msg-assistant p { margin: 0 0 8px 0; }
  .chat-msg-assistant p:last-child { margin-bottom: 0; }
  .chat-msg-assistant code { background: rgba(255,255,255,.08); padding: 1px 5px; border-radius: 4px; font-size: .82em; }
  .chat-msg-assistant pre { background: rgba(0,0,0,.3); padding: 10px 12px; border-radius: 8px; overflow: hidden; margin: 8px 0; max-width: 100%; white-space: pre-wrap; word-wrap: break-word; }
  .chat-msg-assistant table { border-collapse: collapse; max-width: 100%; display: block; font-size: .8em; overflow: hidden; word-break: break-word; }
  .chat-msg-assistant table th, .chat-msg-assistant table td { border: 1px solid var(--border, #2a2d3e); padding: 4px 8px; }
  .chat-msg-assistant img { max-width: 100%; height: auto; }
  .chat-msg-assistant pre code { background: none; padding: 0; }
  .chat-msg-assistant ul, .chat-msg-assistant ol { padding-left: 18px; margin: 4px 0; }
  .chat-msg-assistant a { color: #60a5fa; }

  /* ── Typing indicator ───────────────────────────────────────────────── */
  .chat-typing { align-self: flex-start; display: flex; gap: 5px; padding: 10px 16px; }
  .chat-typing-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted, #64748b);
    animation: chat-bounce .6s infinite alternate;
  }
  .chat-typing-dot:nth-child(2) { animation-delay: .15s; }
  .chat-typing-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes chat-bounce { from { opacity: .3; transform: translateY(0); } to { opacity: 1; transform: translateY(-4px); } }

  /* ── Input area ─────────────────────────────────────────────────────── */
  .chat-input-area {
    padding: 14px 18px; border-top: 1px solid var(--border, #2a2d3e);
    display: flex; gap: 8px; align-items: flex-end; flex-shrink: 0;
  }
  .chat-textarea {
    flex: 1; resize: none; border: 1px solid var(--border, #2a2d3e);
    background: rgba(255,255,255,.04); color: var(--text, #e2e8f0);
    border-radius: 10px; padding: 10px 14px; font-size: .85rem; font-family: inherit;
    line-height: 1.4; max-height: 120px; overflow-y: auto; outline: none;
    transition: border-color .15s;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent;
  }
  .chat-textarea::-webkit-scrollbar { width: 4px; }
  .chat-textarea::-webkit-scrollbar-track { background: transparent; }
  .chat-textarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 4px; }
  .chat-textarea::placeholder { color: var(--muted, #64748b); }
  .chat-textarea:focus { border-color: var(--green, #22c55e); }
  .chat-send-btn {
    width: 38px; height: 38px; border-radius: 50%; border: none;
    background: var(--green, #22c55e); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity .15s;
  }
  .chat-send-btn:disabled { opacity: .4; cursor: default; }
  .chat-send-btn svg { width: 16px; height: 16px; fill: #fff; }

  /* ── Responsive ─────────────────────────────────────────────────────── */
  @media (max-width: 480px) {
    .chat-sidebar { width: 100%; }
    .chat-fab { bottom: 16px; right: 16px; }
  }
</style>

<!-- FAB -->
<button class="chat-fab" id="chatFab" aria-label="Open chat">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H5.2L4 17.2V4h16v12z"/></svg>
</button>

<!-- Sidebar -->
<div class="chat-sidebar" id="chatPanel">
  <div class="chat-header">
    <span class="chat-header-title">Factory Assistant</span>
    <div class="chat-header-actions">
      <button class="chat-header-btn" id="chatNewBtn">New Chat</button>
      <button class="chat-header-btn" id="chatCloseBtn">&#10005;</button>
    </div>
  </div>

  <div class="chat-quick" id="chatQuick">
    <div class="chat-quick-label">Quick Questions</div>
    <button class="chat-quick-btn" data-q="What POINT I/O modules are available for analog input?">POINT I/O analog input modules</button>
    <button class="chat-quick-btn" data-q="What are the differences between CompactLogix and Compact GuardLogix?">CompactLogix vs GuardLogix</button>
    <button class="chat-quick-btn" data-q="What programming languages does the Micro800 family support?">Micro800 programming languages</button>
    <button class="chat-quick-btn" data-q="List the POINT I/O discrete output modules and their specs">POINT I/O discrete outputs</button>
    <button class="chat-quick-btn" data-q="What communication options are available for CompactLogix controllers?">CompactLogix communications</button>
    <button class="chat-quick-btn" data-q="Which Micro800 controller is best for a small standalone application?">Micro800 for standalone apps</button>
    <button class="chat-quick-btn" data-q="What power supply modules are available for POINT I/O?">POINT I/O power supplies</button>
    <button class="chat-quick-btn" data-q="Compare the memory and I/O capacity of CompactLogix 5380 vs 5480">CompactLogix 5380 vs 5480</button>
    <button class="chat-quick-btn" data-q="What are the Micro850 expansion I/O options?">Micro850 expansion I/O</button>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="chat-msg chat-msg-assistant">Hi! I'm the Factory Assistant. Ask me anything about Rockwell Automation products, factory operations, or troubleshooting.</div>
  </div>

  <div class="chat-input-area">
    <textarea class="chat-textarea" id="chatInput" rows="1" placeholder="Type a message..."></textarea>
    <button class="chat-send-btn" id="chatSendBtn" disabled aria-label="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
(function() {
  // ── State ──────────────────────────────────────────────────────────────
  var SESSION_KEY = 'chat_session_id';
  var sessionId = localStorage.getItem(SESSION_KEY);
  if (!sessionId) {
    sessionId = crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sessionId);
  }

  var fab       = document.getElementById('chatFab');
  var panel     = document.getElementById('chatPanel');
  var msgArea   = document.getElementById('chatMessages');
  var input     = document.getElementById('chatInput');
  var sendBtn   = document.getElementById('chatSendBtn');
  var newBtn    = document.getElementById('chatNewBtn');
  var closeBtn  = document.getElementById('chatCloseBtn');
  var quickWrap = document.getElementById('chatQuick');
  var sending   = false;
  var quickCache = {};  // cache quick-question responses keyed by question text

  var WELCOME = 'Hi! I\'m the Factory Assistant. Ask me anything about Rockwell Automation products, factory operations, or troubleshooting.';

  // ── Open / Close ───────────────────────────────────────────────────────
  fab.addEventListener('click', function() {
    panel.classList.add('chat-open');
    fab.classList.add('chat-hidden');
    input.focus();
  });
  closeBtn.addEventListener('click', function() {
    panel.classList.remove('chat-open');
    fab.classList.remove('chat-hidden');
  });

  // ── New Chat ───────────────────────────────────────────────────────────
  newBtn.addEventListener('click', function() {
    sessionId = crypto.randomUUID();
    localStorage.setItem(SESSION_KEY, sessionId);
    msgArea.innerHTML = '<div class="chat-msg chat-msg-assistant">' + WELCOME + '</div>';
    input.value = '';
    autoResize();
  });

  // ── Quick questions ────────────────────────────────────────────────────
  quickWrap.addEventListener('click', function(e) {
    var btn = e.target.closest('.chat-quick-btn');
    if (!btn || sending) return;
    var q = btn.getAttribute('data-q');
    if (!q) return;

    // Show user bubble
    appendMsg('user', q);

    // Serve from cache if available
    if (quickCache[q]) {
      appendMsg('assistant', quickCache[q]);
      return;
    }

    // Otherwise fetch and cache the result
    input.value = '';
    sendMessage(q, true);
  });

  // ── Input handling ─────────────────────────────────────────────────────
  input.addEventListener('input', function() {
    autoResize();
    sendBtn.disabled = !input.value.trim() || sending;
  });
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  function autoResize() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  }

  // ── Send message ───────────────────────────────────────────────────────
  // overrideText: used by quick-question handler to pass the question directly
  // isQuick: if true, cache the response under overrideText
  function sendMessage(overrideText, isQuick) {
    var text = overrideText || input.value.trim();
    if (!text || sending) return;
    sending = true;
    sendBtn.disabled = true;
    if (!overrideText) {
      input.value = '';
      autoResize();
      // User bubble only for typed messages (quick questions append their own)
      appendMsg('user', text);
    }

    // Typing indicator
    var typing = document.createElement('div');
    typing.className = 'chat-typing';
    typing.innerHTML = '<div class="chat-typing-dot"></div><div class="chat-typing-dot"></div><div class="chat-typing-dot"></div>';
    msgArea.appendChild(typing);
    scrollBottom();

    var cacheKey = isQuick ? text : null;

    // Stream response
    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: sessionId, chatInput: text })
    }).then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      if (typing.parentNode) typing.parentNode.removeChild(typing);

      // Create assistant bubble
      var bubble = document.createElement('div');
      bubble.className = 'chat-msg chat-msg-assistant';
      msgArea.appendChild(bubble);

      var accumulated = '';
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      function read() {
        reader.read().then(function(result) {
          if (result.done) {
            // Process any remaining buffer
            if (buffer.trim()) {
              try {
                var obj = JSON.parse(buffer);
                if (obj.type === 'item' && obj.content) {
                  accumulated += obj.content;
                }
              } catch(e) {}
            }
            if (cacheKey) quickCache[cacheKey] = accumulated;
            finalize(bubble, accumulated);
            return;
          }
          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop(); // keep incomplete last line

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;
            try {
              var obj = JSON.parse(line);
              if (obj.type === 'item' && obj.content) {
                accumulated += obj.content;
              }
            } catch(e) {}
          }
          renderMarkdown(bubble, accumulated);
          scrollBottom();
          read();
        }).catch(function(err) {
          finalize(bubble, accumulated || 'Sorry, something went wrong.');
        });
      }
      read();
    }).catch(function(err) {
      if (typing.parentNode) typing.parentNode.removeChild(typing);
      appendMsg('assistant', 'Sorry, I could not reach the backend. Please try again.');
      sending = false;
      sendBtn.disabled = !input.value.trim();
    });
  }

  function finalize(bubble, text) {
    renderMarkdown(bubble, text || 'No response received.');
    scrollBottom();
    sending = false;
    sendBtn.disabled = !input.value.trim();
  }

  function appendMsg(role, text) {
    var div = document.createElement('div');
    div.className = 'chat-msg chat-msg-' + role;
    if (role === 'assistant') {
      renderMarkdown(div, text);
    } else {
      div.textContent = text;
    }
    msgArea.appendChild(div);
    scrollBottom();
  }

  function renderMarkdown(el, text) {
    if (typeof marked !== 'undefined' && marked.parse) {
      el.innerHTML = marked.parse(text || '');
    } else {
      el.textContent = text || '';
    }
  }

  function scrollBottom() {
    msgArea.scrollTop = msgArea.scrollHeight;
  }
})();
</script>
